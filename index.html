<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robust Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f3f4f6;
        }

        .calculator {
            background-color: #111827;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 70px;
            background-color: #1f2937;
            border: none;
            color: #ffffff;
            font-size: 2.2rem;
            text-align: right;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 56px;
            border: none;
            border-radius: 8px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            background-color: #374151;
            color: #ffffff;
            transition: background-color 0.1s, transform 0.05s;
        }

        button:active {
            transform: scale(0.95);
        }

        button.operator {
            background-color: #f59e0b;
        }

        button.operator:hover {
            background-color: #d97706;
        }

        button.clear {
            background-color: #ef4444;
        }

        button.clear:hover {
            background-color: #dc2626;
        }

        button.equal {
            background-color: #10b981;
            grid-column: span 2;
        }

        button.equal:hover {
            background-color: #059669;
        }

        button:hover:not(.operator):not(.clear):not(.equal) {
            background-color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly value="0">
        <div class="buttons">
            <button class="clear" onclick="clearAll()">C</button>
            <button class="operator" onclick="handleOperator('/')">/</button>
            <button class="operator" onclick="handleOperator('*')">*</button>
            <button onclick="deleteLast()">⌫</button>

            <button onclick="inputDigit('7')">7</button>
            <button onclick="inputDigit('8')">8</button>
            <button onclick="inputDigit('9')">9</button>
            <button class="operator" onclick="handleOperator('-')">-</button>

            <button onclick="inputDigit('4')">4</button>
            <button onclick="inputDigit('5')">5</button>
            <button onclick="inputDigit('6')">6</button>
            <button class="operator" onclick="appendOperatorPlus('+')">+</button>

            <button onclick="inputDigit('1')">1</button>
            <button onclick="inputDigit('2')">2</button>
            <button onclick="inputDigit('3')">3</button>
            <button class="equal" onclick="handleEqual()">=</button>

            <button onclick="inputDigit('0')" style="grid-column: span 2;">0</button>
            <button onclick="inputDecimal('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        
        let displayValue = '0';
        let firstOperand = null;
        let waitingForSecondOperand = false;
        let operator = null;

        function updateDisplay() {
            display.value = displayValue;
        }

        function inputDigit(digit) {
            if (waitingForSecondOperand) {
                displayValue = digit;
                waitingForSecondOperand = false;
            } else {
                displayValue = displayValue === '0' ? digit : displayValue + digit;
            }
            updateDisplay();
        }

        function inputDecimal(dot) {
            if (waitingForSecondOperand) {
                displayValue = '0.';
                waitingForSecondOperand = false;
                updateDisplay();
                return;
            }
            
            // Safeguard against duplicate decimal formatting bugs (e.g., 5.5.5)
            if (!displayValue.includes(dot)) {
                displayValue += dot;
            }
            updateDisplay();
        }

        function handleOperator(nextOperator) {
            const inputValue = parseFloat(displayValue);

            // Contextual override: allows the user to switch operators mid-stream (e.g., pressing '+' then changing to '*')
            if (operator && waitingForSecondOperand)  {
                operator = nextOperator;
                return;
            }

            if (firstOperand === null && !isNaN(inputValue)) {
                firstOperand = inputValue;
            } else if (operator) {
                const result = calculate(firstOperand, inputValue, operator);
                displayValue = `${parseFloat(result.toFixed(7))}`;
                firstOperand = result;
            }

            waitingForSecondOperand = true;
            operator = nextOperator;
            updateDisplay();
        }

        // Dedicated helper function wrapper to clarify interface semantics for addition operations
        function appendOperatorPlus(op) {
            handleOperator(op);
        }

        function calculate(first, second, op) {
            if (op === '+') return first + second;
            if (op === '-') return first - second;
            if (op === '*') return first * second;
            if (op === '/') {
                if (second === 0) return NaN; // Explicitly catch division by zero exceptions
                return first / second;
            }
            return second;
        }

        function handleEqual() {
            if (operator === null || waitingForSecondOperand) return;

            const inputValue = parseFloat(displayValue);
            const result = calculate(firstOperand, inputValue, operator);

            if (isNaN(result)) {
                displayValue = 'Error';
            } else {
                // Fixed-point rounding solves trailing floating-point mantissa noise (e.g., 0.1 + 0.2)
                displayValue = `${parseFloat(result.toFixed(7))}`;
            }
            
            firstOperand = null;
            operator = null;
            waitingForSecondOperand = false;
            updateDisplay();
        }

        function clearAll() {
            displayValue = '0';
            firstOperand = null;
            waitingForSecondOperand = false;
            operator = null;
            updateDisplay();
        }

        function deleteLast() {
            if (displayValue === 'Error' || waitingForSecondOperand) {
                clearAll();
                return;
            }
            displayValue = displayValue.slice(0, -1);
            if (displayValue === '' || displayValue === '-') {
                displayValue = '0';
            }
            updateDisplay();
        }
    </script>
</body>
</html>
